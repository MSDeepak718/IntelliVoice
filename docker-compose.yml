version: "3.9"

services:
  # ---------- MongoDB ----------
  mongodb:
    image: mongo:7
    container_name: intellivoice-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: intellivoice
      MONGO_INITDB_ROOT_PASSWORD: intellivoice
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Mongo Express (Admin UI) ----------
  mongo-express:
    image: mongo-express:1
    container_name: intellivoice-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: intellivoice
      ME_CONFIG_MONGODB_ADMINPASSWORD: intellivoice
      ME_CONFIG_MONGODB_URL: mongodb://intellivoice:intellivoice@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  # ---------- Backend ----------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: intellivoice-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://intellivoice:intellivoice@mongodb:27017
    volumes:
      - ./models:/app/models
      - ./backend:/app/backend
      - ./config:/app/config
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  mongo-data:
